ktor {
  deployment {
    port = 8080
    port = ${?PORT}
  }
  application {
    modules = ["no.java.cupcake.ApplicationKt.module"]
  }
}

sleepingpill {
  base = ${?SP_BASE_URL}
  username = ${?SP_USER}
  password = ${?SP_PASSWORD}
  cache_ttl_seconds = 3600
  cache_ttl_seconds = ${?SP_CACHE_TTL_SECONDS}
  max_past_years = 3
  include_current_year = true
}

bring {
  username = ${?BRING_API_USER}
  api_key = ${?BRING_API_KEY}
  postalcodes_url = "https://api.bring.com/address/api/NO/postal-codes"
}

oidc {
  well_known_url = ${?OIDC_WELL_KNOWN_URL}
  expected_azp = "cupcake-client"
  expected_azp = ${?OIDC_EXPECTED_AZP}
}

jwt {
  enabled = true
  enabled = ${?JWT_ENABLED}
}